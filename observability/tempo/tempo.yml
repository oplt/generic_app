server:
  http_listen_port: 3200

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: "127.0.0.1:4317"
        http:
          endpoint: "127.0.0.1:4318"

storage:
  trace:
    backend: local
    wal:
      path: ./.observability-data/tempo/wal
    local:
      path: ./.observability-data/tempo/blocks

compactor:
  compaction:
    block_retention: 24h
